<!DOCTYPE html>
<html class="scroll-smooth h-full" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Messages | Onlifit</title>
    
    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Performance: Optimized fonts - removed unused weights -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS -->
    <link href="styles.css" rel="stylesheet" />
    
    <style>
        /* Font Size Reset - Standard 16px base */
        html { font-size: 16px; }
        body { font-size: 1rem; line-height: 1.5; }
        
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-effect { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .chat-bubble-received { border-top-left-radius: 0.25rem; }
        .chat-bubble-sent { border-top-right-radius: 0.25rem; }
        
        /* Typing indicator animation */
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        .typing-dot {
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        /* Message status icons */
        .msg-status { font-size: 14px; opacity: 0.6; }
        .msg-status.seen { color: #4CAF50; opacity: 1; }
        
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1A1A1A;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Unread badge */
        .unread-badge {
            min-width: 20px;
            height: 20px;
            background: #000;
            color: white;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
        }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4W2306MJ1Y"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-4W2306MJ1Y');
</script>
</head>
<body class="bg-surface h-full font-body text-on-surface overflow-hidden">

<div class="flex flex-col h-full">
    <!-- Nav -->
    <nav class="shrink-0 glass-effect border-b border-outline-variant/30">
        <div class="flex items-center justify-between px-8 py-4 max-w-screen-2xl mx-auto">
            <div class="flex items-center gap-8">
                <a href="onlifit.html" class="text-3xl font-black tracking-tighter text-primary font-headline font-semibold">Onlifit</a>
                <div class="hidden md:flex gap-6 items-center">
                    <a href="about.html" class="text-sm font-bold text-on-surface-variant hover:text-primary transition-colors">About</a>
                    <a href="pricing.html" class="text-sm font-bold text-on-surface-variant hover:text-primary transition-colors">Pricing</a>
                </div>
            </div>
            <div id="nav-auth" class="flex items-center gap-4"></div>
        </div>
    </nav>

    <!-- Main Content (Two-Pane) -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar (Contacts) -->
        <aside id="contacts-sidebar" class="w-full md:w-[360px] border-r border-outline-variant flex flex-col bg-surface-container-low flex-shrink-0">
            <div class="p-6 border-b border-outline-variant/50">
                <h2 class="font-headline text-2xl font-black mb-4">Messages</h2>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">search</span>
                    <input type="text" placeholder="Search contacts..." class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-xl text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all"/>
                </div>
            </div>
            
            <div id="contacts-list" class="flex-1 overflow-y-auto hide-scrollbar divide-y divide-outline-variant/30">
                <!-- Contacts will be injected here -->
            </div>
        </aside>

        <!-- Message View -->
        <section id="chat-view" class="hidden md:flex flex-1 flex-col relative bg-white w-full">
            <div id="chat-header" class="px-4 md:px-8 py-4 border-b border-outline-variant/50 flex items-center justify-between glass-effect sticky top-0 z-10 hidden">
                <div class="flex items-center gap-3">
                    <button onclick="closeChat()" class="md:hidden flex items-center justify-center p-2 -ml-2 rounded-full hover:bg-surface-container transition-colors">
                        <span class="material-symbols-outlined text-on-surface">arrow_back</span>
                    </button>
                    <div id="active-avatar" class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-lg shadow-sm">👤</div>
                    <div>
                        <h3 id="active-name" class="font-bold text-on-surface leading-none mb-1">Name</h3>
                        <p id="active-status" class="text-[10px] uppercase tracking-widest font-black text-tertiary">Online</p>
                        <div id="typing-indicator" class="hidden flex gap-1 mt-1">
                            <span class="w-1.5 h-1.5 bg-primary rounded-full typing-dot"></span>
                            <span class="w-1.5 h-1.5 bg-primary rounded-full typing-dot"></span>
                            <span class="w-1.5 h-1.5 bg-primary rounded-full typing-dot"></span>
                            <span class="text-[9px] text-primary font-bold ml-1">typing</span>
                        </div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button class="w-10 h-10 rounded-full hover:bg-surface-container flex items-center justify-center text-on-surface-variant transition-all"><span class="material-symbols-outlined">call</span></button>
                    <button class="w-10 h-10 rounded-full hover:bg-surface-container flex items-center justify-center text-on-surface-variant transition-all"><span class="material-symbols-outlined">videocam</span></button>
                </div>
            </div>

            <!-- Chat History -->
            <div id="chat-history" class="flex-1 overflow-y-auto p-8 space-y-6 flex flex-col">
                <div class="flex-1 flex flex-col items-center justify-center text-center opacity-40 py-20" id="no-chat-state">
                    <div class="text-7xl mb-6">💬</div>
                    <h3 class="font-headline text-xl font-bold mb-2">Select a Conversation</h3>
                    <p class="text-sm">Choose someone from the list to start chatting.</p>
                </div>
                <!-- Messages will be injected here -->
            </div>

            <!-- Message Input -->
            <div id="message-input-area" class="p-6 border-t border-outline-variant/50 bg-white hidden">
                <div class="flex gap-3 items-end">
                    <button class="w-12 h-12 rounded-xl bg-surface-container-low flex items-center justify-center text-on-surface-variant hover:bg-surface-container transition-all flex-shrink-0"><span class="material-symbols-outlined">add</span></button>
                    <div class="flex-1 relative">
                        <textarea id="msg-input" placeholder="Type your message..." rows="1" class="w-full pl-4 pr-12 py-3 bg-surface-container-low border-none rounded-xl text-sm focus:ring-1 focus:ring-primary transition-all resize-none"></textarea>
                        <button onclick="handleSend()" class="absolute right-3 bottom-2 text-primary hover:scale-110 transition-transform"><span class="material-symbols-outlined text-2xl">send</span></button>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="auth.js"></script>
<script>
    let user = null;
    let currentContactId = null;
    let typingTimeout = null;
    let typingChannel = null;
    let messagesChannel = null;

    async function init() {
        user = await requireAuth();
        if (user) {
            await renderAuthNav();
            await loadContacts();
            
            // Handle auto-selection of chat via URL
            const params = new URLSearchParams(window.location.search);
            const contactId = params.get('id');
            if (contactId) {
                const trainer = await getTrainerById(contactId);
                if (trainer) {
                    await selectChat(trainer.id, trainer.name, trainer.avatar);
                } else {
                    const contact = await getUserById(contactId);
                    if (contact) {
                        await selectChat(contact.id, contact.name, contact.avatar);
                    }
                }
            }

            // Real-time subscription for ALL messages (sent and received)
            messagesChannel = supabaseClient
                .channel('messages-all')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `receiver_id=eq.${user.id}`
                }, (payload) => {
                    const newMessage = payload.new;
                    if (newMessage.sender_id === currentContactId) {
                        loadMessages(); // Refresh if active chat
                        // Mark as read immediately
                        markMessagesAsRead(currentContactId, user.id);
                    }
                    loadContacts(); // Refresh list
                })
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `sender_id=eq.${user.id}`
                }, (payload) => {
                    const newMessage = payload.new;
                    if (newMessage.receiver_id === currentContactId) {
                        loadMessages(); // Show own message instantly
                    }
                    loadContacts(); // Refresh list
                })
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'messages'
                }, (payload) => {
                    // Update message status in real-time (read receipts)
                    if (currentContactId && 
                        (payload.new.sender_id === currentContactId || payload.new.receiver_id === currentContactId)) {
                        loadMessages();
                    }
                })
                .subscribe();
        }
    }

    async function loadContacts() {
        const list = document.getElementById('contacts-list');
        const allTrainers = await getTrainers();
        const bookings = await getBookingsForUser(user.id);
        
        // Unique individuals interacted with
        const contactIds = [...new Set(bookings.map(b => user.role === 'trainer' ? b.client_id : b.trainer_id))];
        
        let contacts = [];
        if (contactIds.length > 0) {
            for (const id of contactIds) {
                let person = allTrainers.find(t => t.id === id);
                if (!person) {
                    person = await getUserById(id);
                }
                if (person) contacts.push(person);
            }
        } else {
            contacts = allTrainers.slice(0, 3);
        }

        // Get last messages for all contacts
        const lastMessages = await getLastMessagesForContacts(user.id, contacts.map(c => c.id));

        // Sort by most recent message
        contacts.sort((a, b) => {
            const aTime = lastMessages[a.id]?.timestamp || 0;
            const bTime = lastMessages[b.id]?.timestamp || 0;
            return new Date(bTime) - new Date(aTime);
        });

        list.innerHTML = contacts.map(c => {
            const lastMsg = lastMessages[c.id];
            const unreadCount = lastMsg?.unreadCount || 0;
            const lastMsgText = lastMsg?.text || 'No messages yet';
            const lastMsgTime = lastMsg?.timestamp ? formatTimestamp(lastMsg.timestamp) : '';
            
            return `
            <div onclick="selectChat('${c.id}', '${c.name}', '${c.avatar_url}')" class="p-4 flex gap-3 hover:bg-white cursor-pointer transition-all border-l-4 border-transparent group ${currentContactId === c.id ? '!border-primary bg-white' : ''}">
                <div class="w-12 h-12 rounded-full bg-surface-container flex flex-shrink-0 items-center justify-center text-xl shadow-sm group-hover:scale-105 transition-transform relative">
                    ${c.avatar_url || '👤'}
                    ${unreadCount > 0 ? `<span class="absolute -top-1 -right-1 unread-badge">${unreadCount}</span>` : ''}
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-start mb-0.5">
                        <h4 class="font-bold text-sm truncate group-hover:text-primary transition-colors">${c.name}</h4>
                        <span class="text-[9px] uppercase font-bold text-on-surface-variant opacity-40">${lastMsgTime}</span>
                    </div>
                    <p class="text-xs text-on-surface-variant truncate ${unreadCount > 0 ? 'font-semibold' : 'opacity-70'}">${lastMsgText}</p>
                </div>
            </div>
        `;
        }).join('');
    }

    function formatTimestamp(timestamp) {
        const date = new Date(timestamp);
        const now = new Date();
        const diff = now - date;
        const minutes = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);

        if (minutes < 1) return 'Now';
        if (minutes < 60) return `${minutes}m`;
        if (hours < 24) return `${hours}h`;
        if (days < 7) return `${days}d`;
        return date.toLocaleDateString();
    }

    async function selectChat(id, name, avatar) {
        currentContactId = id;
        document.getElementById('no-chat-state').classList.add('hidden');
        document.getElementById('chat-header').classList.remove('hidden');
        document.getElementById('message-input-area').classList.remove('hidden');
        
        // Mobile layout toggles
        document.getElementById('contacts-sidebar').classList.add('hidden', 'md:flex');
        document.getElementById('chat-view').classList.remove('hidden');
        document.getElementById('chat-view').classList.add('flex');

        document.getElementById('active-name').textContent = name;
        document.getElementById('active-avatar').textContent = avatar !== 'undefined' && avatar !== 'null' ? avatar : '👤';
        
        // Unsubscribe from previous typing channel
        if (typingChannel) {
            typingChannel.unsubscribe();
        }

        // Subscribe to typing status for this contact
        typingChannel = subscribeToTyping(user.id, id, (isTyping) => {
            const indicator = document.getElementById('typing-indicator');
            const status = document.getElementById('active-status');
            if (isTyping) {
                indicator.classList.remove('hidden');
                status.classList.add('hidden');
            } else {
                indicator.classList.add('hidden');
                status.classList.remove('hidden');
            }
        });
        
        await loadContacts(); 
        await loadMessages();
        
        // Mark all messages from this contact as read
        await markMessagesAsRead(id, user.id);
    }

    function closeChat() {
        // Mobile layout toggles for back button
        document.getElementById('contacts-sidebar').classList.remove('hidden', 'md:flex');
        document.getElementById('chat-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('flex');
    }

    async function loadMessages() {
        if (!currentContactId) return;
        const history = document.getElementById('chat-history');
        const messages = await getMessages(user.id, currentContactId);
        
        history.innerHTML = messages.map(m => {
            const isMe = m.sender_id === user.id;
            const status = m.status || 'sent';
            const isRead = m.read;
            
            // Status icons: ✓ = sent, ✓✓ = delivered, ✓✓ (blue) = seen
            let statusIcon = '';
            if (isMe) {
                if (status === 'seen' || isRead) {
                    statusIcon = '<span class="msg-status seen">✓✓</span>';
                } else if (status === 'delivered') {
                    statusIcon = '<span class="msg-status">✓✓</span>';
                } else {
                    statusIcon = '<span class="msg-status">✓</span>';
                }
            }
            
            return `
                <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[80%]">
                        <div class="px-4 py-3 rounded-2xl text-sm ${isMe ? 'bg-primary text-white chat-bubble-sent shadow-lg shadow-primary/10' : 'bg-surface-container-low text-on-surface chat-bubble-received border border-outline-variant/30'}">
                            ${m.text}
                        </div>
                        <p class="text-[9px] font-bold text-on-surface-variant opacity-40 mt-1 uppercase tracking-tighter ${isMe ? 'text-right' : 'text-left'} flex ${isMe ? 'justify-end' : 'justify-start'} items-center gap-1">
                            ${new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                            ${statusIcon}
                        </p>
                    </div>
                </div>
            `;
        }).join('');
        
        history.scrollTop = history.scrollHeight;
    }

    async function handleSend() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text || !currentContactId) return;

        // Clear input and stop typing indicator
        input.value = '';
        await setTypingStatus(user.id, currentContactId, false);

        // Send message with error handling
        try {
            const sent = await sendMessage(user.id, currentContactId, text);
            if (sent) {
                // Message will appear via real-time subscription
                // Optionally scroll to bottom immediately
                const history = document.getElementById('chat-history');
                setTimeout(() => history.scrollTop = history.scrollHeight, 100);
            } else {
                showToast('Failed to send message. Please try again.', 'error');
            }
        } catch (error) {
            console.error('Send error:', error);
            showToast('Failed to send message. Please try again.', 'error');
        }
    }

    // Show toast notification
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined">${type === 'error' ? 'error' : 'info'}</span>
                <span>${message}</span>
            </div>
        `;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // Handle typing indicator with debounce
    let isTyping = false;
    function handleTyping() {
        if (!currentContactId) return;

        // Clear existing timeout
        if (typingTimeout) {
            clearTimeout(typingTimeout);
        }

        // Set typing status if not already typing
        if (!isTyping) {
            isTyping = true;
            setTypingStatus(user.id, currentContactId, true);
        }

        // Clear typing status after 2 seconds of inactivity
        typingTimeout = setTimeout(async () => {
            isTyping = false;
            await setTypingStatus(user.id, currentContactId, false);
        }, 2000);
    }

    // Enter to send, input event for typing indicator
    const msgInput = document.getElementById('msg-input');
    msgInput.onkeydown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    };
    msgInput.oninput = handleTyping;

    init();
</script>
</body>
</html>
