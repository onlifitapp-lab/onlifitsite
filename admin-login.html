<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Onlifit</title>
    
    <!-- Fonts - Same as main website -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FAFAFA;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: #FFFFFF;
            border: 1px solid #E8E8E8;
            border-radius: 16px;
            padding: 48px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 8px;
            letter-spacing: -0.8px;
        }

        .logo p {
            font-size: 14px;
            color: #666666;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #D0D0D0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #000000;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: #000000;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-login:hover {
            background: #1A1A1A;
            transform: translateY(-1px);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #F5F5F5;
            border: 1px solid #E8E8E8;
            color: #000000;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #666666;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .back-link a:hover {
            color: #000000;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 2px solid #F5F5F5;
            border-top: 2px solid #000000;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4W2306MJ1Y"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-4W2306MJ1Y');
</script>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Onlifit Admin</h1>
            <p>Log in to continue</p>
        </div>

        <div id="error-box" class="error-message"></div>

        <form id="admin-login-form">
            <div class="form-group">
                <label for="admin-email">Email Address</label>
                <input id="admin-email" type="email" autocomplete="email" placeholder="admin@yourdomain.com" required />
            </div>

            <div class="form-group">
                <label for="admin-password">Password</label>
                <input id="admin-password" type="password" autocomplete="current-password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required />
            </div>

            <button id="login-btn" class="btn-login" type="submit">Log In</button>

            <div id="loading" class="loading" style="margin-top: 18px;">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #666; font-size: 14px;">Signing you in...</p>
            </div>
        </form>

        <script>
            const sb = window.supabaseClient || window.supabase;

            function showError(message) {
                const box = document.getElementById('error-box');
                box.textContent = message || 'Login failed';
                box.classList.add('show');
                box.style.display = 'block';
            }

            function setLoading(isLoading) {
                document.getElementById('loading').classList.toggle('show', !!isLoading);
                document.getElementById('login-btn').disabled = !!isLoading;
            }

            function getNextUrl() {
                const url = new URL(window.location.href);
                const next = url.searchParams.get('next');
                return next ? decodeURIComponent(next) : 'admin-dashboard.html';
            }

            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    const { data: { user } } = await sb.auth.getUser();
                    if (user) {
                        const { data: profile, error: profileError } = await sb
                            .from('profiles')
                            .select('role')
                            .eq('id', user.id)
                            .single();

                        if (!profileError && (profile?.role || '').toLowerCase() === 'admin') {
                            window.location.href = getNextUrl();
                            return;
                        }

                        await sb.auth.signOut();
                    }
                } catch (_) {}
            });

            document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('admin-email').value.trim();
                const password = document.getElementById('admin-password').value;

                if (!email || !password) return;

                setLoading(true);
                try {
                    const { data, error } = await sb.auth.signInWithPassword({ email, password });
                    if (error) throw error;

                    const userId = data?.user?.id;
                    if (!userId) throw new Error('No user returned from auth');

                    // Confirm admin role
                    const { data: profile, error: profileError } = await sb
                        .from('profiles')
                        .select('role')
                        .eq('id', userId)
                        .single();

                    if (profileError) throw profileError;
                    if ((profile?.role || '').toLowerCase() !== 'admin') {
                        await sb.auth.signOut();
                        throw new Error('Access denied: admin privileges required');
                    }

                    window.location.href = getNextUrl();
                } catch (err) {
                    showError(err?.message || 'Login failed');
                } finally {
                    setLoading(false);
                }
            });
        </script>

        <div class="back-link">
            <a href="onlifit.html">â† Back to Home</a>
        </div>

        <div class="back-link" style="margin-top: 10px;">
            <a href="login.html">Not an admin? Go to user login</a>
        </div>
    </div>
<script src="footer-component.js"></script></body>
</html>
