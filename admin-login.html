<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Onlifit</title>
    
    <!-- Fonts - Same as main website -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FAFAFA;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: #FFFFFF;
            border: 1px solid #E8E8E8;
            border-radius: 16px;
            padding: 48px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 8px;
            letter-spacing: -0.8px;
        }

        .logo p {
            font-size: 14px;
            color: #666666;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #D0D0D0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #000000;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: #000000;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-login:hover {
            background: #1A1A1A;
            transform: translateY(-1px);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #F5F5F5;
            border: 1px solid #E8E8E8;
            color: #000000;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #666666;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .back-link a:hover {
            color: #000000;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 2px solid #F5F5F5;
            border-top: 2px solid #000000;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Onlifit Admin</h1>
            <p>Administrator Login</p>
        </div>

        <div id="error-message" class="error-message"></div>

        <form id="admin-login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="admin@onlifit.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn-login" id="login-btn">
                Login to Admin Dashboard
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 12px; color: #666666;">Verifying credentials...</p>
        </div>

        <div class="back-link">
            <a href="login.html">← Back to Main Login</a>
        </div>
    </div>

    <script src="supabase-client.js"></script>
    <script>
        const form = document.getElementById('admin-login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const errorMessage = document.getElementById('error-message');
        const loadingDiv = document.getElementById('loading');

        // Check if already logged in as admin
        checkExistingSession();

        async function checkExistingSession() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser();
                
                if (user) {
                    // User is logged in, check if admin
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('role')
                        .eq('id', user.id)
                        .single();
                    
                    if (profile && profile.role === 'admin') {
                        // Already logged in as admin, redirect
                        window.location.href = 'admin-dashboard.html';
                    }
                }
            } catch (err) {
                console.log('No existing session');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            // Show loading state
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            errorMessage.classList.remove('show');

            try {
                // Step 1: Sign in with Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (authError) {
                    throw new Error(authError.message);
                }

                if (!authData.user) {
                    throw new Error('Login failed. Please check your credentials.');
                }

                console.log('Authentication successful:', authData.user.email);

                // Step 2: Check if user has admin role
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('role, name, email')
                    .eq('id', authData.user.id)
                    .single();

                if (profileError) {
                    console.error('Profile error:', profileError);
                    throw new Error('Could not load user profile');
                }

                console.log('Profile loaded:', profile);

                // Step 3: Verify admin role
                if (!profile || profile.role !== 'admin') {
                    // Not an admin - sign them out
                    await supabase.auth.signOut();
                    throw new Error('Access denied. This account does not have admin privileges.');
                }

                // Step 4: Success! Redirect to admin dashboard
                console.log('Admin access granted for:', profile.name);
                
                // Small delay to show success
                loginBtn.textContent = 'Access Granted! Redirecting...';
                loginBtn.style.background = '#000000';
                
                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 500);

            } catch (error) {
                console.error('Login error:', error);
                showError(error.message || 'Login failed. Please try again.');
                
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login to Admin Dashboard';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        // Auto-focus email field
        emailInput.focus();

        // Clear error on input
        emailInput.addEventListener('input', () => errorMessage.classList.remove('show'));
        passwordInput.addEventListener('input', () => errorMessage.classList.remove('show'));
    </script>
</body>
</html>
