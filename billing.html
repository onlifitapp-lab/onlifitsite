<!DOCTYPE html>
<html lang="en" class="h-full scroll-smooth">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Billing | Onlifit</title>
    <link href="styles.css" rel="stylesheet" />
    <link href="mobile-optimizations.css" rel="stylesheet" />
</head>
<body class="bg-surface h-full font-body text-on-surface">
<div class="max-w-screen-2xl mx-auto p-6">
    <header class="mb-8">
        <a href="client-dashboard.html" class="text-sm text-on-surface-variant hover:text-primary">&larr; Back</a>
        <h1 class="text-3xl font-black font-headline mt-3">Billing</h1>
        <p class="text-on-surface-variant mt-1">Manage payment methods and view invoices.</p>
    </header>

    <main>
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="col-span-2 bg-white rounded-2xl p-6 shadow-sm border border-outline-variant/20">
                <h3 class="font-headline text-sm font-bold text-on-surface mb-4">Invoices</h3>
                <div id="invoices-list" class="space-y-4">
                    <div class="text-on-surface-variant">No invoices to show.</div>
                </div>
            </div>

            <aside class="bg-white rounded-2xl p-6 shadow-sm border border-outline-variant/20">
                <h3 class="font-headline text-sm font-bold text-on-surface mb-4">Payment Methods</h3>
                <div id="payment-methods" class="space-y-3">
                    <div class="text-on-surface-variant">No saved payment methods.</div>
                </div>
                <div class="mt-6">
                    <button id="add-method" class="w-full px-4 py-3 bg-primary text-on-primary rounded-lg font-bold">Add Payment Method</button>
                </div>
            </aside>
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="auth.js?v=20260428"></script>
<script>
    async function init() {
        const user = await requireAuth('client', window.location.href);
        if (!user) return;

        // Placeholder: invoices and payment methods come from serverside billing service.
        // We'll show a simple message and provide an Add Payment Method button that opens support.
        document.getElementById('add-method').addEventListener('click', () => {
            window.location.href = 'support.html';
        });
    }
    init();
</script>
<script src="footer-component.js"></script>
</body>
</html>
