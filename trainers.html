<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
      <base href="/">
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Browse All Trainers | Onlifit</title>
    
    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Performance: Optimized fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS -->
    <link href="styles.css" rel="stylesheet" />
    
    <style>
        /* Font Size Reset - Standard 16px base */
        html { font-size: 16px; }
        body { font-size: 1rem; line-height: 1.5; }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 glass-effect border-b border-outline-variant/30">
        <div class="flex items-center justify-between px-8 py-4 max-w-screen-2xl mx-auto">
            <div class="flex items-center gap-8">
                <a href="onlifit.html" class="text-3xl font-black tracking-tighter text-primary font-headline font-semibold">Onlifit</a>
                <div class="hidden md:flex gap-6 items-center">
                    <a href="about.html" class="text-sm font-bold text-on-surface-variant hover:text-primary transition-colors">About</a>
                    <a href="pricing.html" class="text-sm font-bold text-on-surface-variant hover:text-primary transition-colors">Pricing</a>
                    <a href="join-us.html" class="text-sm font-bold text-on-surface-variant hover:text-primary transition-colors">Join Us</a>
                </div>
            </div>
            <div id="auth-nav"></div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="pt-32 pb-16 px-6 bg-gradient-to-b from-surface to-background">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="font-headline text-4xl lg:text-5xl font-black text-on-surface mb-6">Browse All Trainers</h1>
            <p class="text-on-surface-variant text-lg mb-8 max-w-2xl mx-auto">Discover India's largest community of certified personal trainers</p>
            
            <!-- Search Bar -->
            <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl p-2 border border-outline-variant/50 flex flex-col md:flex-row md:items-stretch gap-2 mb-8 overflow-hidden">
                <div class="flex-1 min-w-0 flex items-center gap-3 px-4 md:px-5 py-4 md:py-0 md:min-h-[72px] md:border-r border-outline-variant/30">
                    <input id="search-query" type="text" placeholder="Try 'Yoga' or 'Weight Loss'" 
                        class="w-full border-none focus:ring-0 text-on-surface text-lg font-semibold placeholder:text-on-surface-variant/50 outline-none p-0 bg-transparent" />
                </div>
                <div class="flex-1 min-w-0 flex items-center gap-3 px-4 md:px-5 py-4 md:py-0 md:min-h-[72px]">
                    <select id="search-mode" onchange="toggleLocationInput()" 
                        class="w-full border-none focus:ring-0 text-on-surface text-lg font-semibold outline-none p-0 bg-transparent cursor-pointer h-12 md:h-auto">
                        <option value="online">Online</option>
                        <option value="offline">Offline</option>
                    </select>
                    <input id="search-location" type="text" placeholder="Pincode or City" 
                        style="display: none;"
                        class="w-full border-none focus:ring-0 text-on-surface text-lg font-semibold placeholder:text-on-surface-variant/50 outline-none p-0 bg-transparent h-12 md:h-auto" />
                </div>
                <button onclick="performSearch()" 
                    class="bg-primary text-on-primary px-8 py-4 rounded-xl font-bold hover:opacity-90 transition-all w-full md:w-auto md:min-h-[72px] flex items-center justify-center">
                    Search
                </button>
            </div>

            <!-- Filter Tags -->
            <div class="flex flex-wrap gap-3 justify-center">
                <button onclick="filterBySpecialty('all')" class="filter-tag active px-4 py-2 rounded-full border-2 border-primary bg-primary text-on-primary font-bold text-sm transition-all">All</button>
                <button onclick="filterBySpecialty('Weight Loss')" class="filter-tag px-4 py-2 rounded-full border-2 border-outline text-on-surface-variant font-bold text-sm hover:border-primary hover:text-primary transition-all">Weight Loss</button>
                <button onclick="filterBySpecialty('Yoga')" class="filter-tag px-4 py-2 rounded-full border-2 border-outline text-on-surface-variant font-bold text-sm hover:border-primary hover:text-primary transition-all">Yoga</button>
                <button onclick="filterBySpecialty('Strength')" class="filter-tag px-4 py-2 rounded-full border-2 border-outline text-on-surface-variant font-bold text-sm hover:border-primary hover:text-primary transition-all">Strength</button>
                <button onclick="filterBySpecialty('Cardio')" class="filter-tag px-4 py-2 rounded-full border-2 border-outline text-on-surface-variant font-bold text-sm hover:border-primary hover:text-primary transition-all">Cardio</button>
                <button onclick="filterBySpecialty('Sports')" class="filter-tag px-4 py-2 rounded-full border-2 border-outline text-on-surface-variant font-bold text-sm hover:border-primary hover:text-primary transition-all">Sports</button>
            </div>
        </div>
    </section>

    <!-- Trainers Grid -->
    <section class="py-16 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
                <p class="text-on-surface-variant"><span id="trainer-count" class="font-bold text-on-surface">0</span> trainers found</p>
                <div class="flex items-center gap-3">
                    <label class="flex items-center gap-2 px-3 py-2 rounded-xl border border-outline-variant/40 bg-white text-xs font-black uppercase tracking-widest text-on-surface-variant">
                        <input id="black-only" type="checkbox" class="w-4 h-4 rounded border-outline-variant" />
                        Show only OnliFit Black
                    </label>
                    <select id="sort-by" onchange="sortTrainers()" class="px-4 py-2 rounded-lg border border-outline-variant bg-white text-on-surface font-medium">
                        <option value="rating">Top Rated</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="experience">Most Experienced</option>
                    </select>
                </div>
            </div>

            <div id="trainers-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Trainers will be loaded here -->
            </div>

            <!-- Loading State -->
            <div id="loading" class="text-center py-16">
                <p class="text-on-surface-variant">Loading trainers...</p>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="text-center py-16 hidden">
                <span class="material-symbols-outlined text-6xl text-on-surface-variant mb-4">search_off</span>
                <p class="text-on-surface font-bold text-xl mb-2">No trainers found</p>
                <p class="text-on-surface-variant mb-6">Try adjusting your search or filters</p>
                <button onclick="resetFilters()" class="px-6 py-3 bg-primary text-on-primary rounded-full font-bold hover:opacity-90 transition-all">Reset Filters</button>
            </div>
        </div>
    </section>

    <!-- Supabase and Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script>
        requestAnimationFrame(() => {
            void renderAuthNav();
            void loadTrainers();
        });

        let allTrainers = [];
        let currentFilter = 'all';
        let currentSort = 'rating';
        let showOnlyBlack = false;
        let trainerRealtimeSubscribed = false;

        function toggleLocationInput() {
            const mode = document.getElementById('search-mode').value;
            const locationInput = document.getElementById('search-location');
            locationInput.style.display = mode === 'offline' ? 'block' : 'none';
            if (mode === 'offline') {
                void prefillOfflineLocation();
            } else {
                locationInput.placeholder = 'Pincode or City';
            }
        }

        async function prefillOfflineLocation() {
            const locationInput = document.getElementById('search-location');
            if (!locationInput || locationInput.value.trim()) return;

            locationInput.placeholder = 'Detecting your city...';
            try {
                const resolved = await requestOfflineSearchLocation();
                if (document.getElementById('search-mode')?.value !== 'offline') return;
                if (resolved?.label && !locationInput.value.trim()) {
                    locationInput.value = resolved.label;
                }
            } catch {
                locationInput.placeholder = 'Enter your city';
                locationInput.focus();
            }
        }

        async function requestOfflineSearchLocation() {
            if (typeof window.resolveOfflineSearchLocation === 'function') {
                return window.resolveOfflineSearchLocation();
            }

            if (!navigator.geolocation) {
                throw new Error('Geolocation is not available in this browser.');
            }

            const position = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, {
                    enableHighAccuracy: true,
                    timeout: 6500,
                    maximumAge: 300000
                });
            });

            return {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
                label: 'Your area'
            };
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(price);
        }

        
// --- REALTIME UPDATES ---
function listenForTrainerUpdates() {
    if (trainerRealtimeSubscribed) return;
    trainerRealtimeSubscribed = true;

    supabase.channel('public-trainers-updates')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, payload => {
            const row = payload.new || payload.old;
            if (!row || row.role !== 'trainer') return;

            const updatedTrainer = (typeof window.normalizeTrainerBadges === 'function')
                ? window.normalizeTrainerBadges(row)
                : row;

            const idx = allTrainers.findIndex(t => t.id === updatedTrainer.id);

            if (payload.eventType === 'DELETE') {
                if (idx !== -1) allTrainers.splice(idx, 1);
            } else if (idx !== -1) {
                allTrainers[idx] = { ...allTrainers[idx], ...updatedTrainer };
            } else if (payload.eventType === 'INSERT') {
                allTrainers.push(updatedTrainer);
            }

            // Re-apply all active filters (search, tags, black-only, sort)
            if (typeof applyAllFilters === 'function') applyAllFilters();
        })
        .subscribe();
}
// ------------------------


        function applyTrainerData(trainers) {
            allTrainers = Array.isArray(trainers) ? [...trainers] : [];
            if (allTrainers.length > 0) {
                allTrainers.sort((a, b) => (Number(b.rating) || 0) - (Number(a.rating) || 0));
            }

            applyAllFilters();
            listenForTrainerUpdates();
        }

        async function loadTrainers() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');

            try {
                const blackOnly = document.getElementById('black-only');
                if (blackOnly && !blackOnly.dataset.bound) {
                    blackOnly.addEventListener('change', () => {
                        showOnlyBlack = !!blackOnly.checked;
                        applyAllFilters();
                    });
                    blackOnly.dataset.bound = '1';
                }

                // Prefer auth.js helper (caching + consistent shape)
                if (typeof getTrainers === 'function') {
                    const initialTrainers = await getTrainers({
                        onUpdate: (freshTrainers) => {
                            applyTrainerData(freshTrainers);
                        }
                    });

                    if (Array.isArray(initialTrainers) && initialTrainers.length > 0) {
                        applyTrainerData(initialTrainers);
                    }

                    return;
                }

                // Fallback direct DB fetch (legacy)
                const { data, error } = await supabase
                    .from('profiles')
                    .select('id, name, avatar_url, rating, review_count, location, city, state, training_mode, specialty, bio, plans, tags')
                    .eq('role', 'trainer')
                    .order('rating', { ascending: false });

                if (error) throw error;
                if (blackOnly) {
                    showOnlyBlack = !!blackOnly.checked;
                }
                applyTrainerData(data || []);
            } catch (error) {
                console.error('Error loading trainers:', error);
                allTrainers = [];
                renderTrainers([]);
            }
        }

        function escapeHtml(str) {
            return String(str ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function getHourlyPrice(t) {
            const raw = t?.plans?.hourly?.price;
            const n = typeof raw === 'string' ? Number(raw) : raw;
            return Number.isFinite(n) && n > 0 ? n : null;
        }

        function normalizeTrainingMode(mode) {
            const m = String(mode || '').toLowerCase();
            if (m === 'both') return 'face to face & online';
            if (m === 'offline') return 'face to face';
            if (m === 'online') return 'online';
            return '';
        }

        function getTrainerMeta(t) {
            const cityState = [t?.city, t?.state].filter(Boolean).join(', ');
            const location = (cityState || t?.location || '').trim();
            const mode = normalizeTrainingMode(t?.training_mode);
            if (location && mode) return `${location} (${mode})`;
            return location || mode;
        }

        function renderTrainerAvatar(t) {
            const url = (t?.avatar_url || '').trim();
            const name = (t?.name || 'Trainer').trim();
            const initial = (name.charAt(0) || 'T').toUpperCase();

            if (url && url.startsWith('http')) {
                return `<img src="${escapeHtml(url)}" alt="${escapeHtml(name)}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" />`;
            }

            return `<div class="w-20 h-20 rounded-full bg-white/90 text-primary flex items-center justify-center font-black text-3xl">${escapeHtml(initial)}</div>`;
        }

        function renderTrainerRatingChip(t) {
            const rating = Number(t?.rating);
            const count = Number(t?.review_count);

            if (Number.isFinite(rating) && Number.isFinite(count) && count > 0) {
                const ratingText = Number.isInteger(rating) ? String(rating) : rating.toFixed(1);
                return `
                    <div class="mb-3">
                        <div class="text-sm font-bold text-on-surface leading-none">${escapeHtml(ratingText)}</div>
                        <div class="text-xs text-on-surface-variant font-medium mt-1">(${count} review${count === 1 ? '' : 's'})</div>
                    </div>
                `;
            }

            return `
                <div class="mb-3">
                    <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-surface-container text-on-surface-variant text-xs font-bold uppercase tracking-wider">
                        New
                    </span>
                </div>
            `;
        }

        function renderTrainerPriceLine(t) {
            const p = getHourlyPrice(t);
            if (p) {
                return `<span class="text-primary font-bold text-xl">${formatPrice(p)}</span><span class="text-on-surface-variant text-sm">/hr</span>`;
            }
            return `<span class="text-primary font-bold">View pricing</span>`;
        }

        function renderTrainerBadgeLine(t) {
            const badgeHtml = (typeof window.renderTrainerBadgesHtml === 'function')
                ? window.renderTrainerBadgesHtml(t, { variant: 'inline', size: 'sm' })
                : '';

            return badgeHtml ? `<div class="mb-3">${badgeHtml}</div>` : '';
        }

        function renderTrainerOfferLine() {
            return `<p class="mt-2 text-sm font-semibold text-primary">1st free class</p>`;
        }

        function renderTrainers(trainers) {
            const grid = document.getElementById('trainers-grid');
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('empty-state');
            const count = document.getElementById('trainer-count');

            loading.classList.add('hidden');

            if (!trainers || trainers.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                count.textContent = '0';
                return;
            }

            emptyState.classList.add('hidden');
            count.textContent = trainers.length;

            grid.innerHTML = trainers.map(tRaw => {
                const t = (typeof window.normalizeTrainerBadges === 'function') ? window.normalizeTrainerBadges(tRaw) : tRaw;
                const meta = getTrainerMeta(t);
                const bio = (t?.bio || '').trim();
                const specialty = (t?.specialty || '').trim();
                const description = bio || specialty || '';

                return `
                    <div class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 group cursor-pointer border border-outline-variant/20" onclick="window.location.href='trainer-profile.html?id=${t.id}'">
                        <div class="relative h-64 bg-gradient-to-br from-primary/10 to-secondary/5 flex items-center justify-center overflow-hidden">
                            ${renderTrainerAvatar(t)}
                        </div>
                        <div class="p-5 flex flex-col">
                            <h3 class="font-headline font-bold text-xl text-on-surface mb-1 group-hover:text-primary transition-colors">${escapeHtml(t?.name || 'Trainer')}</h3>
                            ${meta ? `
                                <p class="text-on-surface-variant text-sm mb-3">
                                    ${escapeHtml(meta)}
                                </p>
                            ` : ''}

                            ${renderTrainerRatingChip(t)}
                            ${renderTrainerBadgeLine(t)}
                            ${description ? `<p class="text-sm text-on-surface-variant mb-4 line-clamp-2 flex-grow">${escapeHtml(description)}</p>` : ''}

                            <div class="mt-auto pt-3">
                                <div class="flex items-baseline gap-1">${renderTrainerPriceLine(t)}</div>
                                ${renderTrainerOfferLine()}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function applyAllFilters() {
            const query = (document.getElementById('search-query')?.value || '').trim().toLowerCase();
            const mode = document.getElementById('search-mode')?.value || 'online';
            const location = mode === 'offline' ? (document.getElementById('search-location')?.value || '').trim().toLowerCase() : '';

            let filtered = Array.isArray(allTrainers) ? [...allTrainers] : [];

            if (currentFilter !== 'all') {
                filtered = filtered.filter(t =>
                    t?.specialty?.includes(currentFilter) ||
                    t?.tags?.includes(currentFilter)
                );
            }

            if (query) {
                filtered = filtered.filter(t =>
                    (t?.name || '').toLowerCase().includes(query) ||
                    (t?.specialty || '').toLowerCase().includes(query) ||
                    (t?.bio || '').toLowerCase().includes(query) ||
                    (Array.isArray(t?.tags) ? t.tags.some(tag => String(tag || '').toLowerCase().includes(query)) : false)
                );
            }

            if (location) {
                filtered = filtered.filter(t =>
                    (t?.location || '').toLowerCase().includes(location) ||
                    (t?.city || '').toLowerCase().includes(location) ||
                    (t?.state || '').toLowerCase().includes(location)
                );
            }

            if (showOnlyBlack) {
                filtered = filtered.filter(t => {
                    const normalized = (typeof window.normalizeTrainerBadges === 'function') ? window.normalizeTrainerBadges(t) : t;
                    return !!normalized?.hasBlackStatus;
                });
            }

            sortAndRender(filtered);
        }

        function filterBySpecialty(specialty) {
            currentFilter = specialty;

            // Update active button
            document.querySelectorAll('.filter-tag').forEach(btn => {
                btn.classList.remove('active', 'bg-primary', 'text-on-primary');
                btn.classList.add('border-outline', 'text-on-surface-variant');
            });
            if (typeof event !== 'undefined' && event?.target) {
                event.target.classList.add('active', 'bg-primary', 'text-on-primary', 'border-primary');
                event.target.classList.remove('border-outline', 'text-on-surface-variant');
            }

            applyAllFilters();
        }

        function sortTrainers() {
            currentSort = document.getElementById('sort-by').value;
            applyAllFilters();
        }

        function sortAndRender(trainers) {
            let sorted = [...(trainers || [])];

            switch(currentSort) {
                case 'rating':
                    sorted.sort((a, b) => (Number(b.rating) || 0) - (Number(a.rating) || 0));
                    break;
                case 'price-low':
                    sorted.sort((a, b) => {
                        const pa = getHourlyPrice(a);
                        const pb = getHourlyPrice(b);
                        return (pa ?? Number.POSITIVE_INFINITY) - (pb ?? Number.POSITIVE_INFINITY);
                    });
                    break;
                case 'price-high':
                    sorted.sort((a, b) => {
                        const pa = getHourlyPrice(a);
                        const pb = getHourlyPrice(b);
                        return (pb ?? Number.NEGATIVE_INFINITY) - (pa ?? Number.POSITIVE_INFINITY);
                    });
                    break;
                case 'experience':
                    sorted.sort((a, b) => (b.experience || 0) - (a.experience || 0));
                    break;
            }

            renderTrainers(sorted);
        }

        async function performSearch() {
            const mode = document.getElementById('search-mode')?.value || 'online';
            const locationInput = document.getElementById('search-location');
            if (mode === 'offline' && locationInput && !locationInput.value.trim()) {
                try {
                    const resolved = await requestOfflineSearchLocation();
                    if (resolved?.label) {
                        locationInput.value = resolved.label;
                    } else {
                        locationInput.focus();
                        return;
                    }
                } catch {
                    locationInput.focus();
                    return;
                }
            }
            applyAllFilters();
        }

        function resetFilters() {
            document.getElementById('search-query').value = '';
            document.getElementById('search-mode').value = 'online';
            document.getElementById('search-location').style.display = 'none';
            currentFilter = 'all';
            currentSort = 'rating';
            showOnlyBlack = false;

            const blackOnly = document.getElementById('black-only');
            if (blackOnly) blackOnly.checked = false;

            document.querySelectorAll('.filter-tag').forEach(btn => {
                btn.classList.remove('active', 'bg-primary', 'text-on-primary');
                btn.classList.add('border-outline', 'text-on-surface-variant');
            });
            document.querySelector('.filter-tag').classList.add('active', 'bg-primary', 'text-on-primary', 'border-primary');

            applyAllFilters();
        }

    </script>
</body>
</html>
