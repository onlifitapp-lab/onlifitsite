<!DOCTYPE html>
<html class="scroll-smooth" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Tushar - Personal Trainer | Onlifit</title>
    
    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Performance: Optimized fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                fontSize: {
                    'xs': ['0.75rem', { lineHeight: '1rem' }],
                    'sm': ['0.875rem', { lineHeight: '1.25rem' }],
                    'base': ['1rem', { lineHeight: '1.5rem' }],
                    'lg': ['1.125rem', { lineHeight: '1.75rem' }],
                    'xl': ['1.25rem', { lineHeight: '1.75rem' }],
                    '2xl': ['1.5rem', { lineHeight: '2rem' }],
                    '3xl': ['1.875rem', { lineHeight: '2.25rem' }],
                    '4xl': ['2.25rem', { lineHeight: '2.5rem' }],
                    '5xl': ['3rem', { lineHeight: '1' }],
                    '6xl': ['3.75rem', { lineHeight: '1' }],
                    '7xl': ['4.5rem', { lineHeight: '1' }],
                    '8xl': ['6rem', { lineHeight: '1' }],
                    '9xl': ['8rem', { lineHeight: '1' }],
                },
                extend: {
                    colors: {
                        "primary": "#000000", "primary-container": "#F5F5F5", "secondary": "#1A1A1A",
                        "secondary-container": "#F5F5F5", "tertiary": "#333333", "tertiary-container": "#EBEBEB",
                        "surface": "#FAFAFA", "surface-container-lowest": "#FFFFFF", "surface-container-low": "#FFFFFF",
                        "surface-container": "#F0F0F0", "surface-container-high": "#E0E0E0",
                        "on-surface": "#000000", "on-surface-variant": "#666666", "on-primary": "#FFFFFF",
                        "on-secondary": "#FFFFFF", "on-tertiary": "#FFFFFF", "outline": "#D0D0D0",
                        "outline-variant": "#E8E8E8", "error": "#1A1A1A", "error-container": "#F5F5F5",
                    },
                    fontFamily: { "headline": ["Poppins", "sans-serif"], "body": ["Inter", "sans-serif"] },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                }
            },
        }
    </script>
    <style>
        /* Font Size Reset - Standard 16px base */
        html { font-size: 16px; }
        body { font-size: 1rem; line-height: 1.5; }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .shadow-ambient {
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
        }
    </style>
      <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <!-- Nav -->
    <nav class="fixed top-0 w-full z-50 glass-effect border-b border-outline-variant/30">
        <div class="flex items-center justify-between px-8 py-4 max-w-screen-2xl mx-auto">
            <a href="onlifit.html" class="text-3xl font-black tracking-tighter text-primary font-headline font-semibold">Onlifit</a>
            <div id="nav-auth" class="flex items-center gap-4"></div>
        </div>
    </nav>

    <main class="pt-24 pb-16 max-w-5xl mx-auto px-6">
        <!-- Back -->
        <a href="onlifit.html"
            class="inline-flex items-center gap-1 text-sm text-on-surface-variant hover:text-primary transition-all mb-8">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span> Back to trainers
        </a>

        <div id="profile-content" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: Trainer Info -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Header Card -->
                <div id="trainer-header"
                    class="bg-surface rounded-2xl p-8 shadow-ambient border border-outline-variant/20">
                    <!-- Populated by JS -->
                </div>

                <!-- About the Trainer -->
                <div id="trainer-about"
                    class="bg-surface rounded-2xl p-8 shadow-ambient border border-outline-variant/20">
                    <!-- Populated by JS -->
                </div>

                <!-- About the Training -->
                <div id="trainer-training"
                    class="bg-surface rounded-2xl p-8 shadow-ambient border border-outline-variant/20">
                    <!-- Populated by JS -->
                </div>

                <!-- Reviews -->
                <div id="trainer-reviews"
                    class="bg-surface rounded-2xl p-8 shadow-ambient border border-outline-variant/20">
                    <!-- Populated by JS -->
                </div>

                <!-- Similar Trainers -->
                <div id="similar-trainers"
                    class="bg-surface rounded-2xl p-8 shadow-ambient border border-outline-variant/20">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Right Column: Plans & Booking -->
            <div class="space-y-6">
                <div id="trainer-plans"
                    class="bg-surface rounded-2xl p-6 shadow-ambient border border-outline-variant/20 sticky top-28">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Booking Modal -->
    <div id="booking-modal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeBookingModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-surface rounded-2xl p-8 max-w-md w-full shadow-2xl relative max-h-[90vh] overflow-y-auto">
                <button onclick="closeBookingModal()"
                    class="absolute top-4 right-4 text-on-surface-variant hover:text-on-surface">
                    <span class="material-symbols-outlined">close</span>
                </button>
                <h3 class="font-headline text-xl font-bold mb-1">Book Session</h3>
                <p id="modal-trainer-name" class="text-on-surface-variant text-sm mb-6"></p>

                <div id="modal-plan-info" class="bg-primary-container/30 rounded-xl p-4 mb-6"></div>

                <form id="booking-form" onsubmit="handleBooking(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1.5">Preferred Date</label>
                        <input id="booking-date" type="date" required
                            class="w-full px-4 py-3 rounded-xl bg-surface-container-low border border-outline-variant/30 focus:border-primary focus:ring-2 focus:ring-primary/20 text-sm" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1.5">Preferred Time</label>
                        <select id="booking-time" required
                            class="w-full px-4 py-3 rounded-xl bg-surface-container-low border border-outline-variant/30 focus:border-primary focus:ring-2 focus:ring-primary/20 text-sm">
                            <option value="7:00 AM">7:00 AM</option>
                            <option value="8:00 AM">8:00 AM</option>
                            <option value="9:00 AM">9:00 AM</option>
                            <option value="10:00 AM" selected>10:00 AM</option>
                            <option value="11:00 AM">11:00 AM</option>
                            <option value="4:00 PM">4:00 PM</option>
                            <option value="5:00 PM">5:00 PM</option>
                            <option value="6:00 PM">6:00 PM</option>
                            <option value="7:00 PM">7:00 PM</option>
                        </select>
                    </div>

                    <div class="pt-2 border-t border-outline-variant/20">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-sm text-on-surface-variant">Total</span>
                            <span id="modal-price" class="text-2xl font-black text-primary font-headline"></span>
                        </div>
                        <button type="submit"
                            class="w-full py-4 bg-primary text-on-primary rounded-xl font-bold shadow-lg shadow-primary/20 hover:opacity-90 transition-all flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined text-[18px]">payment</span> Pay with Razorpay
                        </button>
                        <p class="text-[10px] text-on-surface-variant text-center mt-2">Secured by Razorpay. You won't
                            be charged until the session is confirmed.</p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 z-[110] hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-surface rounded-2xl p-8 max-w-sm w-full shadow-2xl text-center">
                <div class="w-20 h-20 bg-tertiary-container rounded-full flex items-center justify-center mx-auto mb-6">
                    <span class="material-symbols-outlined text-tertiary text-4xl"
                        style="font-variation-settings: 'FILL' 1;">check_circle</span>
                </div>
                <h3 class="font-headline text-2xl font-bold mb-2">Booking Confirmed!</h3>
                <p class="text-on-surface-variant text-sm mb-6">Your session has been booked successfully. The trainer
                    will confirm within 12 hours.</p>
                <a href="client-dashboard.html"
                    class="block w-full py-3 bg-primary text-on-primary rounded-xl font-bold hover:opacity-90 transition-all">View
                    My Bookings</a>
            </div>
        </div>
    </div>

    <!-- Performance: Load critical scripts immediately -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script>
        let trainer = null;
        let selectedPlan = null;

        // Show loading skeleton
        function showLoadingSkeleton() {
            document.getElementById('trainer-header').innerHTML = `
                <div class="animate-pulse flex gap-6">
                    <div class="w-28 h-28 bg-surface-container rounded-2xl"></div>
                    <div class="flex-1 space-y-3">
                        <div class="h-8 bg-surface-container rounded w-1/3"></div>
                        <div class="h-4 bg-surface-container rounded w-2/3"></div>
                        <div class="h-4 bg-surface-container rounded w-1/2"></div>
                    </div>
                </div>
            `;
        }

        // Initialize Page Content
        window.onload = async function () {
            showLoadingSkeleton();
            
            // Run auth nav and trainer fetch in parallel
            const params = new URLSearchParams(window.location.search);
            const trainerId = params.get('id');

            const [_, trainerData] = await Promise.all([
                renderAuthNav(),
                trainerId ? getTrainerById(trainerId) : null
            ]);

            trainer = trainerData;

            if (!trainer) {
                // Show error or redirect
                document.body.innerHTML = `
                <div class="min-h-screen flex items-center justify-center bg-surface-container-lowest p-6">
                    <div class="text-center">
                        <span class="material-symbols-outlined text-6xl text-primary mb-4">person_off</span>
                        <h1 class="text-2xl font-bold text-on-surface mb-2 font-headline">Trainer Not Found</h1>
                        <p class="text-on-surface-variant mb-6">The trainer you are looking for does not exist or has been removed.</p>
                        <a href="onlifit.html" class="px-8 py-3 bg-primary text-on-primary rounded-xl font-bold inline-block">Back to Marketplace</a>
                    </div>
                </div>`;
                return;
            }

            renderTrainerProfile();
        };

        function renderTrainerProfile() {
            // Update page title
            document.title = trainer.name + ' | Onlifit';

            // Render header
            // Smart location display logic
            const hasOnline = trainer.session_mode === 'online' || trainer.session_mode === 'both';
            const hasOffline = trainer.session_mode === 'offline' || trainer.session_mode === 'both';
            let locationDisplay = '';
            if (hasOnline && hasOffline) {
                locationDisplay = `${trainer.location || 'Location'} + Online`;
            } else if (hasOnline) {
                locationDisplay = 'Online Only';
            } else {
                locationDisplay = trainer.location || 'Location';
            }
            
            document.getElementById('trainer-header').innerHTML = `
            <div class="flex flex-col sm:flex-row items-center sm:items-start gap-6">
                <div class="w-28 h-28 rounded-2xl bg-gradient-to-br from-primary/10 to-primary-container/20 flex items-center justify-center text-5xl shadow-lg ring-4 ring-surface-container-low">
                    ${trainer.avatar_url || '🏋️'}
                </div>
                <div class="flex-1 text-center sm:text-left">
                    <div class="flex flex-wrap items-center justify-center sm:justify-start gap-2 mb-2">
                        <h1 class="font-headline text-2xl font-bold text-on-surface">${trainer.name}</h1>
                        <span class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider bg-primary text-on-primary">Verified</span>
                    </div>
                    
                    <!-- Specialization Tags -->
                    <div class="flex flex-wrap items-center justify-center sm:justify-start gap-2 mb-3">
                        ${(trainer.tags || ['Personal Trainer', 'Fitness']).map(tag => `
                            <span class="px-3 py-1 bg-primary text-on-primary text-xs font-semibold rounded-full">${tag}</span>
                        `).join('')}
                    </div>
                    
                    <!-- Rating, Response Time, Location -->
                    <div class="flex flex-wrap items-center justify-center sm:justify-start gap-4 text-sm text-on-surface-variant mb-2">
                        <span class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1; color: #f59e0b;">star</span>
                            <strong class="text-on-surface">${trainer.rating || '5.0'}</strong> (${trainer.review_count || 0} Reviews)
                        </span>
                        <span class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-[16px]">schedule</span> 
                            <strong class="text-on-surface">${trainer.response_time || '< 3h'}</strong> response time
                        </span>
                        <span class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-[16px]">location_on</span> 
                            <strong class="text-on-surface">${locationDisplay}</strong>
                        </span>
                    </div>
                    
                    <div class="flex flex-wrap items-center mt-4 gap-3 text-center sm:text-left justify-center sm:justify-start">
                        <a href="messages.html?id=${trainer.id}" class="px-6 py-2 bg-white border border-outline-variant text-sm font-bold text-on-surface hover:border-primary hover:text-primary rounded-xl transition-all flex items-center gap-2">
                            <span class="material-symbols-outlined text-[18px]">chat_bubble</span> Message
                        </a>
                    </div>
                </div>
            </div>
        `;

            // Render about the trainer
            document.getElementById('trainer-about').innerHTML = `
            <h2 class="font-headline text-lg font-bold mb-4">About ${trainer.name.split(' ')[0]}</h2>
            <p class="text-on-surface-variant leading-relaxed mb-6">${trainer.bio || 'Highly motivated professional dedicated to client success.'}</p>
            <div>
                <h3 class="text-sm font-bold text-on-surface mb-3">Certifications</h3>
                <div class="flex flex-wrap gap-2">
                    ${(trainer.certifications || ['Professional Certification']).map(c => `<span class="flex items-center gap-1 px-3 py-1.5 bg-tertiary-container/30 rounded-lg text-xs font-semibold text-tertiary"><span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">verified</span>${c}</span>`).join('')}
                </div>
            </div>
        `;

            // Render about the training approach
            document.getElementById('trainer-training').innerHTML = `
            <h2 class="font-headline text-lg font-bold mb-4">About the Training</h2>
            <p class="text-on-surface-variant leading-relaxed mb-4">${trainer.training_approach || 'I believe in personalized training that adapts to your unique goals and fitness level. My approach combines proven techniques with modern fitness science to help you achieve sustainable results.'}</p>
            <div class="grid md:grid-cols-2 gap-4">
                <div class="p-4 bg-surface-container-low rounded-xl">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="material-symbols-outlined text-primary">school</span>
                        <span class="text-sm font-bold">Teaching Style</span>
                    </div>
                    <p class="text-xs text-on-surface-variant">${trainer.teaching_style || 'Patient, motivating, and results-focused with clear guidance at every step.'}</p>
                </div>
                <div class="p-4 bg-surface-container-low rounded-xl">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="material-symbols-outlined text-primary">target</span>
                        <span class="text-sm font-bold">Training Focus</span>
                    </div>
                    <p class="text-xs text-on-surface-variant">${trainer.training_focus || 'Goal-oriented programs with emphasis on proper form, progression, and injury prevention.'}</p>
                </div>
            </div>
        `;

            // Render reviews
            const reviews = trainer.reviews || [];
            document.getElementById('trainer-reviews').innerHTML = `
            <div class="flex items-center justify-between mb-6">
                <h2 class="font-headline text-lg font-bold">Reviews</h2>
                <div class="flex items-center gap-1 text-sm">
                    <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1; color: #f59e0b;">star</span>
                    <strong>${trainer.rating || '5.0'}</strong>
                    <span class="text-on-surface-variant">(${trainer.review_count || 0})</span>
                </div>
            </div>
            <div class="space-y-6">
                ${reviews.length > 0 ? reviews.map(r => `
                    <div class="pb-6 border-b border-outline-variant/20 last:border-0 last:pb-0">
                        <div class="flex items-center justify-between mb-2">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-xs font-bold text-on-surface-variant">${(r.client?.name || 'U').charAt(0)}</div>
                                <span class="text-sm font-semibold">${r.client?.name || 'Anonymous User'}</span>
                            </div>
                            <span class="text-xs text-on-surface-variant">${new Date(r.created_at).toLocaleDateString()}</span>
                        </div>
                        <div class="flex gap-0.5 mb-2">${'<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: \'FILL\' 1; color: #f59e0b;">star</span>'.repeat(r.rating || 5)}${'<span class="material-symbols-outlined text-[14px] text-surface-container-high" style="font-variation-settings: \'FILL\' 1;">star</span>'.repeat(5 - (r.rating || 5))}</div>
                        <p class="text-sm text-on-surface-variant leading-relaxed">${r.text}</p>
                    </div>
                `).join('') : '<p class="text-on-surface-variant italic py-4 text-center">No reviews yet. Be the first to book and leave feedback!</p>'}
            </div>
        `;

            // Show loading state for similar trainers
            document.getElementById('similar-trainers').innerHTML = `
                <h2 class="font-headline text-lg font-bold mb-4">Similar Trainers You May Like</h2>
                <div class="grid md:grid-cols-3 gap-4">
                    <div class="animate-pulse p-4 bg-surface-container-low rounded-xl h-48"></div>
                    <div class="animate-pulse p-4 bg-surface-container-low rounded-xl h-48"></div>
                    <div class="animate-pulse p-4 bg-surface-container-low rounded-xl h-48"></div>
                </div>
            `;
            
            // Load similar trainers lazily (don't block main content)
            setTimeout(() => renderSimilarTrainers(), 100);

            // Render plans
            const p = trainer.plans || {};
            let plansHTML = `<h2 class="font-headline text-lg font-bold mb-1">Plans & Pricing</h2>
            <p class="text-xs text-on-surface-variant mb-6">Choose a plan that fits your goals</p>
            <div class="space-y-3">`;

            const renderPlan = (id, plan) => `
            <button onclick="selectPlan('${id}')" id="plan-btn-${id}" class="plan-btn w-full text-left p-4 rounded-xl border-2 border-outline-variant/30 hover:border-primary/50 transition-all group">
                <div class="flex justify-between items-start mb-1">
                    <span class="text-sm font-bold capitalize">${plan.label || id}</span>
                    <span class="text-lg font-black text-primary font-headline">${formatPrice(plan.price)}</span>
                </div>
                <p class="text-xs text-on-surface-variant">${plan.description || ''}</p>
            </button>`;

            if (p.hourly) plansHTML += renderPlan('hourly', p.hourly);
            if (p.monthly) plansHTML += renderPlan('monthly', p.monthly);
            if (p.premium) plansHTML += renderPlan('premium', p.premium);

            // Default plans if none exist for trainer
            if (Object.keys(p).length === 0) {
                plansHTML += renderPlan('standard', { label: 'Single Session', price: 2000, description: '1 hour personalized training' });
            }

            plansHTML += `</div>
            <button id="book-now-btn" onclick="openBookingModal()" disabled class="w-full mt-6 py-4 bg-secondary text-on-secondary rounded-xl font-bold shadow-lg shadow-secondary/10 hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-[18px]">bolt</span> Book Now
            </button>
            <p class="text-[10px] text-center text-on-surface-variant mt-2">Select a plan above to continue</p>
        `;

            document.getElementById('trainer-plans').innerHTML = plansHTML;

            // Set min date to today
            const todayDate = new Date().toISOString().split('T')[0];
            document.getElementById('booking-date').min = todayDate;
            document.getElementById('booking-date').value = todayDate;
        }

        function selectPlan(type) {
            selectedPlan = type;
            document.querySelectorAll('.plan-btn').forEach(btn => {
                btn.classList.remove('border-primary', 'bg-primary-container/20');
                btn.classList.add('border-outline-variant/30');
            });
            const active = document.getElementById('plan-btn-' + type);
            if (active) {
                active.classList.remove('border-outline-variant/30');
                active.classList.add('border-primary', 'bg-primary-container/20');
                document.getElementById('book-now-btn').disabled = false;
            }
        }

        async function openBookingModal() {
            if (!selectedPlan) return;

            const user = await getCurrentUser();
            if (!user) {
                window.location.href = 'login.html?role=client&hideRole=true&redirect=' + encodeURIComponent(window.location.href);
                return;
            }
            if (user.role === 'trainer') {
                alert('Please log in as a client to book a trainer.');
                return;
            }

            const plan = (trainer.plans && trainer.plans[selectedPlan]) || { label: 'Standard Session', price: 2000 };
            document.getElementById('modal-trainer-name').textContent = 'with ' + trainer.name;
            document.getElementById('modal-plan-info').innerHTML = `
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-sm font-bold capitalize">${plan.label || selectedPlan}</p>
                    <p class="text-xs text-on-surface-variant">${plan.description || ''}</p>
                </div>
                <span class="text-primary font-black font-headline">${formatPrice(plan.price)}</span>
            </div>
        `;
            document.getElementById('modal-price').textContent = formatPrice(plan.price);
            document.getElementById('booking-modal').classList.remove('hidden');
        }

        function closeBookingModal() {
            document.getElementById('booking-modal').classList.add('hidden');
        }

        async function handleBooking(e) {
            e.preventDefault();
            const user = await getCurrentUser();
            if (!user) return;

            const date = document.getElementById('booking-date').value;
            const time = document.getElementById('booking-time').value;

            const bookingBtn = e.target.querySelector('button[type="submit"]');
            const originalBtnContent = bookingBtn.innerHTML;
            
            bookingBtn.disabled = true;
            bookingBtn.innerHTML = '<div class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div> Processing...';

            try {
                // 1. Create Order via Vercel Backend
                const response = await fetch('/api/create-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        clientId: user.id,
                        trainerId: trainer.id,
                        planType: selectedPlan,
                        details: { date, time }
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to initialize payment');
                }

                // 2. Open Razorpay Checkout
                const options = {
                    key: data.keyId,
                    amount: data.amount,
                    currency: data.currency,
                    name: 'Onlifit',
                    description: `Booking for ${trainer.name}`,
                    order_id: data.orderId,
                    handler: async function (rpResponse) {
                        try {
                            // 3. Verify Payment on Backend
                            const verifyRes = await fetch('/api/verify-payment', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    razorpay_order_id: rpResponse.razorpay_order_id,
                                    razorpay_payment_id: rpResponse.razorpay_payment_id,
                                    razorpay_signature: rpResponse.razorpay_signature,
                                    booking_id: data.bookingId
                                })
                            });
                            
                            const verifyData = await verifyRes.json();
                            if (verifyRes.ok && verifyData.success) {
                                document.getElementById('booking-modal').classList.add('hidden');
                                document.getElementById('success-modal').classList.remove('hidden');
                            } else {
                                alert('Payment verification failed. If money was deducted, contact support.');
                            }
                        } catch (err) {
                            alert('An error occurred during payment verification.');
                        }
                        
                        bookingBtn.disabled = false;
                        bookingBtn.innerHTML = originalBtnContent;
                    },
                    prefill: {
                        name: user.name,
                        email: user.email,
                        contact: user.phone || ''
                    },
                    theme: {
                        color: '#000000'
                    },
                    modal: {
                        ondismiss: function() {
                            bookingBtn.disabled = false;
                            bookingBtn.innerHTML = originalBtnContent;
                        }
                    }
                };

                const rzp = new Razorpay(options);
                rzp.on('payment.failed', function (response){
                    alert('Payment failed. Reason: ' + response.error.description);
                });
                rzp.open();
                
            } catch (error) {
                alert('Booking failed: ' + error.message);
                bookingBtn.disabled = false;
                bookingBtn.innerHTML = originalBtnContent;
            }
        }

        async function renderSimilarTrainers() {
            try {
                // Find trainers with similar tags/goals - fetch only needed fields
                const trainerTags = trainer.tags || [];
                const { data: similarTrainers, error } = await supabase
                    .from('profiles')
                    .select('id, name, avatar_url, tags, rating, review_count, location, plans')
                    .eq('role', 'trainer')
                    .neq('id', trainer.id)
                    .limit(3);

                if (error) throw error;

                // Filter trainers that share at least one tag with current trainer
                let filteredTrainers = similarTrainers || [];
                if (trainerTags.length > 0 && filteredTrainers.length > 0) {
                    const matchingTrainers = filteredTrainers.filter(t => 
                        (t.tags || []).some(tag => trainerTags.includes(tag))
                    );
                    // Use matching trainers if found, otherwise use all
                    if (matchingTrainers.length > 0) {
                        filteredTrainers = matchingTrainers;
                    }
                }

                const trainersToShow = filteredTrainers.slice(0, 3);

                document.getElementById('similar-trainers').innerHTML = `
                    <h2 class="font-headline text-lg font-bold mb-4">Similar Trainers You May Like</h2>
                    <p class="text-sm text-on-surface-variant mb-6">Trainers with similar expertise and goals</p>
                    <div class="grid md:grid-cols-3 gap-4">
                        ${trainersToShow.map(t => `
                            <a href="trainer-profile.html?id=${t.id}" class="block p-4 bg-surface-container-low rounded-xl border border-outline-variant/30 hover:border-primary/50 hover:shadow-lg transition-all">
                                <div class="flex items-center gap-3 mb-3">
                                    <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-primary/10 to-primary-container/20 flex items-center justify-center text-2xl">
                                        ${t.avatar_url || '🏋️'}
                                    </div>
                                    <div class="flex-1">
                                        <h3 class="font-bold text-sm mb-1">${t.name}</h3>
                                        <div class="flex items-center gap-1 text-xs">
                                            <span class="material-symbols-outlined text-[12px]" style="font-variation-settings: 'FILL' 1; color: #f59e0b;">star</span>
                                            <span class="font-bold">${t.rating || '5.0'}</span>
                                            <span class="text-on-surface-variant">(${t.review_count || 0})</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex flex-wrap gap-1 mb-3">
                                    ${(t.tags || ['Fitness']).slice(0, 2).map(tag => `
                                        <span class="px-2 py-0.5 bg-primary text-on-primary text-[10px] font-semibold rounded-full">${tag}</span>
                                    `).join('')}
                                </div>
                                <div class="text-xs text-on-surface-variant mb-2">
                                    <span class="material-symbols-outlined text-[12px]">location_on</span>
                                    ${t.location || 'Online'}
                                </div>
                                <div class="flex items-center justify-between pt-3 border-t border-outline-variant/20">
                                    <span class="text-xs text-on-surface-variant">Starting at</span>
                                    <span class="text-sm font-black text-primary">${formatPrice(t.plans?.hourly?.price || 2000)}</span>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                    <div class="mt-6 text-center">
                        <a href="trainers.html" class="inline-flex items-center gap-2 px-6 py-3 border-2 border-outline-variant rounded-xl font-bold text-sm hover:border-primary hover:text-primary transition-all">
                            View All Trainers
                            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                        </a>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading similar trainers:', error);
                document.getElementById('similar-trainers').innerHTML = `
                    <h2 class="font-headline text-lg font-bold mb-4">Similar Trainers You May Like</h2>
                    <p class="text-sm text-on-surface-variant italic">Unable to load similar trainers at this time.</p>
                `;
            }
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('en-IN', {
                style: 'currency',
                currency: 'INR',
                maximumFractionDigits: 0
            }).format(price);
        }
    </script>
</body>
