<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map View | Onlifit</title>
    <meta name="description" content="Discover trainers near you with map-based search on Onlifit.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <link href="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.css" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: #fafafa;
            color: #000;
        }

        .map-page {
            min-height: 100vh;
            padding-top: 4.5rem;
            display: flex;
            flex-direction: column;
        }

        .map-toolbar {
            position: sticky;
            top: 4.5rem;
            z-index: 40;
            background: rgba(250, 250, 250, 0.95);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .map-layout {
            display: flex;
            flex: 1;
            min-height: calc(100vh - 4.5rem - 92px);
        }

        .map-canvas {
            position: relative;
            flex: 1;
            min-width: 0;
        }

        #map {
            width: 100%;
            height: 100%;
            min-height: 70vh;
        }

        .map-status {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 5;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 16px;
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 700;
            color: #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .map-actions {
            position: absolute;
            left: 16px;
            bottom: 16px;
            z-index: 5;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .results-panel {
            width: 380px;
            border-left: 1px solid rgba(0, 0, 0, 0.08);
            background: #fff;
            display: flex;
            flex-direction: column;
            min-width: 320px;
        }

        .results-panel__header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .trainer-list {
            overflow: auto;
            padding: 14px;
            display: grid;
            gap: 12px;
        }

        .trainer-card {
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 18px;
            padding: 14px;
            background: #fff;
            display: grid;
            grid-template-columns: 56px 1fr;
            gap: 12px;
            align-items: start;
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
        }

        .trainer-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.08);
            border-color: rgba(255, 90, 95, 0.35);
        }

        .trainer-card.is-nearest {
            border-color: #000;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.12);
        }

        .trainer-avatar {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.08), rgba(255, 90, 95, 0.12));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #000;
            flex-shrink: 0;
        }

        .map-mobile-toggle {
            display: none;
        }

        .map-mobile-sheet {
            display: none;
        }

        .filter-bar {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 10px;
            padding: 14px 16px;
        }

        .filter-chip,
        .filter-select,
        .filter-input {
            width: 100%;
            min-width: 0;
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 14px;
            background: #fff;
            padding: 10px 12px;
            font-size: 14px;
            font-weight: 600;
            color: #111;
            outline: none;
        }

        .filter-chip:focus,
        .filter-select:focus,
        .filter-input:focus {
            border-color: #000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
        }

        .mapboxgl-popup-content,
        .maplibregl-popup-content {
            padding: 0;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
        }

        .popup-card {
            width: 260px;
            background: #fff;
        }

        .popup-card__image {
            width: 100%;
            height: 140px;
            background: #f4f4f4;
            object-fit: cover;
        }

        .popup-card__body {
            padding: 14px;
        }

        .popup-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        @media (max-width: 1024px) {
            .map-layout {
                flex-direction: column;
            }

            .results-panel {
                display: none;
            }

            .filter-bar {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .map-mobile-toggle {
                display: inline-flex;
            }

            .map-mobile-sheet {
                display: block;
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 60;
                background: #fff;
                border-top-left-radius: 24px;
                border-top-right-radius: 24px;
                box-shadow: 0 -18px 40px rgba(0, 0, 0, 0.14);
                transform: translateY(calc(100% - 72px));
                transition: transform .25s ease;
                max-height: 68vh;
                display: flex;
                flex-direction: column;
            }

            .map-mobile-sheet.open {
                transform: translateY(0);
            }

            .map-mobile-sheet__handle {
                padding: 14px 16px 10px;
                border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            }

            .map-mobile-sheet__content {
                overflow: auto;
                padding: 12px 14px 18px;
            }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body">
    <nav class="fixed top-0 w-full z-50 glass-effect border-b border-outline-variant/30 bg-white/90">
        <div class="flex items-center justify-between px-4 md:px-8 py-4 max-w-screen-2xl mx-auto">
            <div class="flex items-center gap-5">
                <a href="onlifit.html" class="text-3xl font-black tracking-tighter text-primary font-headline font-semibold">Onlifit</a>
                <div class="hidden md:flex gap-5 items-center text-sm font-bold">
                    <a href="onlifit.html" class="text-on-surface-variant hover:text-primary transition-colors">Home</a>
                    <a href="trainers.html" class="text-on-surface-variant hover:text-primary transition-colors">Trainers</a>
                    <a href="map.html" class="text-primary">Map View</a>
                </div>
            </div>
            <div id="nav-auth" class="flex items-center gap-3"></div>
        </div>
    </nav>

    <main class="map-page">
        <section class="map-toolbar">
            <div class="px-4 md:px-8 py-4 max-w-screen-2xl mx-auto">
                <div class="flex flex-col gap-3 md:gap-4">
                    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                        <div>
                            <h1 class="text-2xl md:text-3xl font-black font-headline text-on-surface">Find trainers on the map</h1>
                            <p class="text-sm text-on-surface-variant">Search nearby or city-based offline trainers.</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <span id="visible-count" class="px-3 py-2 rounded-full bg-surface-container text-on-surface-variant text-xs font-black uppercase tracking-widest">0 trainers</span>
                            <button id="mobile-sheet-btn" class="map-mobile-toggle px-4 py-2 rounded-xl bg-primary text-on-primary font-bold text-sm">Trainers</button>
                        </div>
                    </div>

                    <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-6">
                        <input id="city-search" class="filter-input xl:col-span-2" type="text" placeholder="Search city or area">
                        <select id="mode-filter" class="filter-select">
                            <option value="offline" selected>Offline / Face to Face</option>
                            <option value="online">Online</option>
                            <option value="both">Both</option>
                            <option value="all">All Modes</option>
                        </select>
                        <select id="price-filter" class="filter-select">
                            <option value="all">Any price</option>
                            <option value="0-500">Under ₹500</option>
                            <option value="500-1000">₹500 - ₹1000</option>
                            <option value="1000+">Above ₹1000</option>
                        </select>
                        <select id="rating-filter" class="filter-select">
                            <option value="all">Any rating</option>
                            <option value="4">4.0+</option>
                            <option value="4.5">4.5+</option>
                            <option value="5">5.0</option>
                        </select>
                        <label class="flex items-center gap-2 px-3 py-2 rounded-xl border border-outline-variant bg-white text-xs font-black uppercase tracking-widest text-on-surface-variant">
                            <input id="black-only" type="checkbox" class="w-4 h-4 rounded border-outline-variant">
                            OnliFit Black
                        </label>
                    </div>

                    <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-6">
                        <select id="radius-filter" class="filter-select">
                            <option value="all">Any distance</option>
                            <option value="5">Within 5 km</option>
                            <option value="10">Within 10 km</option>
                            <option value="20">Within 20 km</option>
                        </select>
                        <button id="city-search-btn" class="px-4 py-2 rounded-xl bg-surface-container-low border border-outline-variant font-bold hover:bg-surface-container transition-all">Go to city</button>
                        <button id="near-me-btn" class="px-4 py-2 rounded-xl bg-primary text-on-primary font-bold hover:opacity-90 transition-all">Find Trainers Near Me</button>
                        <button id="refresh-btn" class="px-4 py-2 rounded-xl bg-surface-container-low border border-outline-variant font-bold hover:bg-surface-container transition-all">Refresh</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="map-layout">
            <div class="map-canvas">
                <div id="map"></div>
                <div id="map-status" class="map-status">Loading map...</div>
                <div class="map-actions">
                    <button id="fit-btn" class="px-4 py-2 rounded-xl bg-white border border-outline-variant font-bold text-sm shadow-sm hover:bg-surface-container transition-all">Fit visible trainers</button>
                </div>
            </div>

            <aside class="results-panel">
                <div class="results-panel__header">
                    <div class="flex items-center justify-between gap-3">
                        <div>
                            <h2 class="text-lg font-black font-headline">Nearby trainers</h2>
                            <p id="panel-subtitle" class="text-xs text-on-surface-variant">All visible trainers</p>
                        </div>
                        <span id="panel-count" class="px-2.5 py-1 rounded-full bg-surface-container text-xs font-black uppercase tracking-widest">0</span>
                    </div>
                </div>
                <div id="trainer-list" class="trainer-list"></div>
            </aside>
        </div>
    </main>

    <div id="mobile-sheet" class="map-mobile-sheet">
        <div class="map-mobile-sheet__handle">
            <div class="flex items-center justify-between gap-3">
                <div>
                    <h2 class="text-base font-black font-headline">Trainer list</h2>
                    <p id="mobile-subtitle" class="text-xs text-on-surface-variant">Tap a trainer to open details</p>
                </div>
                <button id="mobile-sheet-close" class="px-3 py-2 rounded-xl bg-surface-container-low border border-outline-variant text-xs font-bold">Close</button>
            </div>
        </div>
        <div id="mobile-trainer-list" class="map-mobile-sheet__content grid gap-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script src="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.js"></script>
    <script src="map.js"></script>
</body>
</html>
