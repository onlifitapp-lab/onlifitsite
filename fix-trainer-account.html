<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix My Trainer Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">Fix Your Trainer Account</h1>
        
        <div id="status" class="mb-6 p-4 rounded-xl"></div>
        
        <div class="bg-white p-6 rounded-xl shadow-sm space-y-4">
            <p class="text-gray-600">If you signed up as a trainer but were redirected to the client dashboard, click the button below to fix your account and set your role to "trainer".</p>
            
            <button onclick="fixAccount()" 
                    class="w-full px-6 py-3 bg-black text-white font-bold rounded-xl hover:opacity-90">
                Fix My Account & Go to Onboarding
            </button>
            
            <button onclick="logout()" 
                    class="w-full px-6 py-3 border-2 border-gray-300 font-bold rounded-xl hover:bg-gray-50">
                Logout & Sign Up Again
            </button>
        </div>
        
        <div class="mt-6 p-4 bg-blue-50 rounded-xl">
            <h3 class="font-bold mb-2">🔍 Debug Info:</h3>
            <div id="debug" class="text-sm text-gray-600"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script>
        async function fixAccount() {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'mb-6 p-4 rounded-xl bg-blue-50';
            statusDiv.innerHTML = '⏳ Fixing your account...';
            
            try {
                const user = await getCurrentUser();
                if (!user) {
                    statusDiv.className = 'mb-6 p-4 rounded-xl bg-red-50 text-red-600';
                    statusDiv.innerHTML = '❌ Please log in first';
                    return;
                }
                
                // Update role to trainer
                const { error } = await supabase
                    .from('profiles')
                    .update({ role: 'trainer' })
                    .eq('id', user.id);
                
                if (error) throw error;
                
                statusDiv.className = 'mb-6 p-4 rounded-xl bg-green-50 text-green-600';
                statusDiv.innerHTML = '✅ Account fixed! Redirecting to onboarding...';
                
                setTimeout(() => {
                    window.location.href = 'trainer-onboarding.html';
                }, 1500);
                
            } catch (error) {
                statusDiv.className = 'mb-6 p-4 rounded-xl bg-red-50 text-red-600';
                statusDiv.innerHTML = '❌ Error: ' + error.message;
            }
        }
        
        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'join-us.html';
        }
        
        window.onload = async function() {
            const user = await getCurrentUser();
            const debugDiv = document.getElementById('debug');
            
            if (user) {
                debugDiv.innerHTML = `
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>Current Role:</strong> ${user.role || 'Not set'}</p>
                    <p><strong>Name:</strong> ${user.name || 'Not set'}</p>
                `;
            } else {
                debugDiv.innerHTML = '<p>Not logged in</p>';
            }
        };
    </script>
</body>
</html>
