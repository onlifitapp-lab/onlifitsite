<!DOCTYPE html>
<html lang="en">
<head>
      <base href="/">
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login / Sign Up | Onlifit</title>
    
    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    
    <!-- Performance: Optimized fonts - removed unused weights -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS -->
    <link href="styles.css" rel="stylesheet" />
    
    <style>
        /* Font Size Reset - Standard 16px base */
        html { font-size: 16px; }
        body { font-size: 1rem; line-height: 1.5; }
        
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-effect { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    </style>
</head>
<body class="bg-primary-container/20 font-body text-on-surface min-h-screen flex items-center justify-center p-6">
    <div class="max-w-lg w-full bg-surface rounded-3xl shadow-2xl p-8 md:p-10 border border-outline-variant/30 text-center">
        <a href="onlifit.html" class="text-3xl font-black tracking-tighter text-primary font-headline font-semibold mb-4 inline-block">Onlifit</a>
        <h1 class="text-3xl font-black font-headline text-on-surface mb-3">Authentication paused</h1>
        <p class="text-on-surface-variant mb-8">
            Login and signup are temporarily disabled while OTP auth is being built.
        </p>

        <div class="grid gap-3">
            <a href="client-dashboard.html" class="w-full py-3.5 bg-primary text-on-primary rounded-xl font-bold shadow-lg shadow-primary/20 hover:opacity-90 transition-all">
                Open Client Dashboard
            </a>
            <a href="bookings.html" class="w-full py-3.5 bg-surface-container-low border border-outline-variant/50 rounded-xl font-bold text-on-surface hover:bg-surface-container transition-all">
                Open Trainer Dashboard
            </a>
            <a href="trainers.html" class="w-full py-3.5 bg-surface-container-low border border-outline-variant/50 rounded-xl font-bold text-on-surface hover:bg-surface-container transition-all">
                Browse Trainers
            </a>
        </div>

        <p class="text-center text-xs text-on-surface-variant mt-8 font-medium">
            OTP auth will replace this page later.
        </p>
    </div>
</body>
</html>
