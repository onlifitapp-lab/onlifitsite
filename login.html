<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login / Sign Up | Onlifit</title>
    
    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    
    <!-- Performance: Optimized fonts - removed unused weights -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                fontSize: {
                    'xs': ['0.75rem', { lineHeight: '1rem' }],
                    'sm': ['0.875rem', { lineHeight: '1.25rem' }],
                    'base': ['1rem', { lineHeight: '1.5rem' }],
                    'lg': ['1.125rem', { lineHeight: '1.75rem' }],
                    'xl': ['1.25rem', { lineHeight: '1.75rem' }],
                    '2xl': ['1.5rem', { lineHeight: '2rem' }],
                    '3xl': ['1.875rem', { lineHeight: '2.25rem' }],
                    '4xl': ['2.25rem', { lineHeight: '2.5rem' }],
                    '5xl': ['3rem', { lineHeight: '1' }],
                    '6xl': ['3.75rem', { lineHeight: '1' }],
                    '7xl': ['4.5rem', { lineHeight: '1' }],
                    '8xl': ['6rem', { lineHeight: '1' }],
                    '9xl': ['8rem', { lineHeight: '1' }],
                },
                extend: {
                    colors: {
                        "primary":"#000000","on-primary":"#FFFFFF","primary-container":"#F5F5F5","secondary":"#1A1A1A",
                        "surface":"#FAFAFA","on-surface":"#000000","on-surface-variant":"#666666",
                        "outline-variant":"#E8E8E8","tertiary":"#333333","tertiary-container":"#EBEBEB",
                        "background":"#F5F5F5","surface-container-low":"#FFFFFF","surface-container":"#F0F0F0"
                    },
                    fontFamily: { "headline":["Poppins","sans-serif"], "body":["Inter","sans-serif"] },
                    borderRadius: {"DEFAULT":"1rem","lg":"2rem","xl":"3rem","full":"9999px"},
                }
            },
        }
    </script>
    <style>
        /* Font Size Reset - Standard 16px base */
        html { font-size: 16px; }
        body { font-size: 1rem; line-height: 1.5; }
        
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-effect { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    </style>
</head>
<body class="bg-primary-container/20 font-body text-on-surface min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-surface rounded-3xl shadow-2xl p-8 border border-outline-variant/30">
        <div class="text-center mb-8">
            <a href="onlifit.html" class="text-3xl font-black tracking-tighter text-primary font-headline font-semibold mb-2 inline-block">Onlifit</a>
            <p id="auth-subtitle" class="text-on-surface-variant text-sm font-medium">Welcome back! Please enter your details.</p>
        </div>

        <!-- Tabs -->
        <div class="flex p-1 bg-surface-container-low rounded-xl mb-8">
            <button onclick="switchTab('login')" id="login-tab" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all bg-surface shadow-sm text-on-surface">Login</button>
            <button onclick="switchTab('signup')" id="signup-tab" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all text-on-surface-variant hover:text-on-surface">Sign Up</button>
        </div>

        <!-- Error Message -->
        <div id="auth-error" class="hidden mb-6 p-4 bg-error-container text-error text-xs font-bold rounded-xl border border-error/10"></div>

        <!-- Form -->
        <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-4">
            <div id="name-field" class="hidden">
                <label class="block text-sm font-bold mb-1.5 ml-1">Full Name</label>
                <input id="name" type="text" placeholder="John Doe" class="w-full px-4 py-3 rounded-xl bg-surface-container-low border border-outline-variant/30 focus:border-primary focus:ring-2 focus:ring-primary/20 text-sm font-medium"/>
            </div>

            <div>
                <label class="block text-sm font-bold mb-1.5 ml-1">Email Address</label>
                <input id="email" type="email" required placeholder="name@email.com" class="w-full px-4 py-3 rounded-xl bg-surface-container-low border border-outline-variant/30 focus:border-primary focus:ring-2 focus:ring-primary/20 text-sm font-medium"/>
            </div>

            <div id="phone-field" class="hidden">
                <label class="block text-sm font-bold mb-1.5 ml-1">Mobile Number</label>
                <input id="phone" type="tel" placeholder="+91 98765 43210" class="w-full px-4 py-3 rounded-xl bg-surface-container-low border border-outline-variant/30 focus:border-primary focus:ring-2 focus:ring-primary/20 text-sm font-medium"/>
            </div>

            <div>
                <label class="block text-sm font-bold mb-1.5 ml-1">Password</label>
                <input id="password" type="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl bg-surface-container-low border border-outline-variant/30 focus:border-primary focus:ring-2 focus:ring-primary/20 text-sm font-medium"/>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-4 bg-primary text-white rounded-xl font-bold shadow-lg shadow-primary/20 hover:opacity-90 transition-all flex items-center justify-center gap-2 mt-6">
                Login
            </button>
        </form>

        <div class="mt-6">
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-outline-variant/30"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-surface text-on-surface-variant font-medium">Or continue with</span>
                </div>
            </div>
            <button onclick="signInWithGoogle()" type="button" class="mt-6 w-full py-3.5 bg-surface border border-outline-variant/50 rounded-xl font-bold text-on-surface hover:bg-surface-container-low transition-all flex items-center justify-center gap-3 shadow-sm">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
                Google
            </button>
        </div>

        <p class="text-center text-xs text-on-surface-variant mt-8 font-medium">
            By continuing, you agree to our <a href="terms.html" class="text-primary hover:underline">Terms of Service</a>.
        </p>
    </div>

    <!-- Scripts must load in order (no defer) so inline script can access functions -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script>
        let currentMode = 'login'; // 'login' or 'signup'
        let selectedRole = 'client';

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            
            console.log('=== LOGIN PAGE DEBUG ===');
            console.log('URL parameters:', Object.fromEntries(params));
            
            // Handle OAuth callback first
            await handleOAuthCallback();
            
            // Switch tab first so it updates default visibility
            if (params.get('tab') === 'signup') {
                switchTab('signup');
            } else {
                switchTab('login');
            }
            
            // Then apply overrides (role is hidden by default now but we can still set the variable)
            if (params.get('role')) {
                selectedRole = params.get('role');
                console.log('Role set from URL:', selectedRole);
            } else {
                console.log('No role in URL, using default:', selectedRole);
            }
            
            // Check if provider=google is in URL (auto-trigger Google OAuth)
            if (params.get('provider') === 'google') {
                console.log('Auto-triggering Google OAuth with role:', selectedRole);
                const isSignup = currentMode === 'signup';
                await signInWithGoogle(selectedRole, isSignup);
            }
        };

        function switchTab(mode) {
            currentMode = mode;
            const loginTab = document.getElementById('login-tab');
            const signupTab = document.getElementById('signup-tab');
            const nameField = document.getElementById('name-field');
            const phoneField = document.getElementById('phone-field');
            const submitBtn = document.getElementById('submit-btn');
            const subtitle = document.getElementById('auth-subtitle');

            if (mode === 'signup') {
                loginTab.className = "flex-1 py-2 text-sm font-bold rounded-lg transition-all text-on-surface-variant hover:text-on-surface";
                signupTab.className = "flex-1 py-2 text-sm font-bold rounded-lg transition-all bg-surface shadow-sm text-on-surface";
                nameField.classList.remove('hidden');
                phoneField.classList.remove('hidden');
                submitBtn.textContent = 'Create Account';
                subtitle.textContent = 'Join Onlifit to start your fitness journey.';
            } else {
                signupTab.className = "flex-1 py-2 text-sm font-bold rounded-lg transition-all text-on-surface-variant hover:text-on-surface";
                loginTab.className = "flex-1 py-2 text-sm font-bold rounded-lg transition-all bg-surface shadow-sm text-on-surface";
                nameField.classList.add('hidden');
                phoneField.classList.add('hidden');
                submitBtn.textContent = 'Login';
                subtitle.textContent = 'Welcome back! Please enter your details.';
            }
        }

        // selectRole removed as it is no longer used by buttons

        async function handleAuth(e) {
            e.preventDefault();
            const errorDiv = document.getElementById('auth-error');
            const submitBtn = document.getElementById('submit-btn');
            errorDiv.classList.add('hidden');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div> Processing...';

            try {
                let response;
                if (currentMode === 'signup') {
                    console.log('=== SIGNUP DEBUG ===');
                    console.log('Name:', name);
                    console.log('Email:', email);
                    console.log('Role:', selectedRole);
                    console.log('Phone:', phone);
                    
                    response = await signUp(name, email, password, selectedRole, {}, phone);
                    
                    console.log('Signup response:', response);
                } else {
                    response = await login(email, password);
                }

                if (response.success) {
                    const params = new URLSearchParams(window.location.search);
                    const redirect = params.get('redirect');
                    
                    console.log('Login/Signup successful!');
                    console.log('Current mode:', currentMode);
                    console.log('Selected role:', selectedRole);
                    console.log('User role from response:', response.user?.role);
                    
                    // IMPORTANT: For trainer signups, go to onboarding
                    if (currentMode === 'signup' && selectedRole === 'trainer') {
                        console.log('Redirecting new trainer to onboarding');
                        window.location.href = 'trainer-onboarding.html';
                    }
                    // For client signups, go to onboarding
                    else if (currentMode === 'signup' && selectedRole === 'client') {
                        console.log('Redirecting new client to onboarding');
                        window.location.href = 'onboarding.html';
                    }
                    // If there's a specific redirect URL
                    else if (redirect) {
                        console.log('Redirecting to:', redirect);
                        window.location.href = decodeURIComponent(redirect);
                    } 
                    // For logins, use role-based redirect
                    else {
                        const targetPage = response.user.role === 'admin' ? 'admin-dashboard.html' : (response.user.role === 'trainer' ? 'bookings.html' : 'client-dashboard.html');
                        console.log('Redirecting based on role to:', targetPage);
                        window.location.href = targetPage;
                    }
                } else {
                    throw new Error(response.error);
                }
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = currentMode === 'signup' ? 'Create Account' : 'Login';
            }
        }
    </script>
</body>
</html>
