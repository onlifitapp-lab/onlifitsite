<body>
    <h1>ðŸ” Debug User Data</h1>
    <div class="label">Loading user data...</div>
    <pre id="output">Please wait...</pre>

    <script>
        async function debugUser() {
            try {
                const user = await getCurrentUser();
                
                if (!user) {
                    document.getElementById('output').textContent = 'No user logged in';
                    return;
                }

                const output = {
                    'User ID': user.id,
                    'Email': user.email,
                    'Name': user.name,
                    'Role': user.role,
                    'Phone': user.phone,
                    'Address': user.address,
                    'Avatar URL': user.avatar_url,
                    'Specialty': user.specialty,
                    'Experience': user.experience,
                    'Bio': user.bio,
                    'Plans': user.plans,
                    'Certifications': user.certifications,
                    '---FULL OBJECT---': user
                };

                document.getElementById('output').textContent = JSON.stringify(output, null, 2);
                
                console.log('=== USER DEBUG ===');
                console.log('Role:', user.role);
                console.log('Role type:', typeof user.role);
                console.log('Is trainer (===):', user.role === 'trainer');
                console.log('Is trainer (toLowerCase):', user.role && user.role.toLowerCase() === 'trainer');
                console.log('Full user object:', user);
            } catch (error) {
                document.getElementById('output').textContent = 'Error: ' + error.message;
                console.error('Debug error:', error);
            }
        }

        // Run on page load
        debugUser();
    </script>
<script src="footer-component.js"></script></body>
</html>
