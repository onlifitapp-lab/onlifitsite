<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Personalize Your Journey | Onlifit</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    "primary":"#FF5A5F","primary-container":"#FFE8E9","secondary":"#222222",
                    "surface":"#FFFFFF","on-surface":"#222222","on-surface-variant":"#717171",
                    "outline-variant":"#EBEBEB"
                },
                fontFamily: { "headline":["Poppins","sans-serif"], "body":["Inter","sans-serif"] },
                borderRadius: {"DEFAULT":"1rem","lg":"2rem","xl":"3rem","full":"9999px"},
            }},
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .step-transition { transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full">
        <!-- Progress Bar -->
        <div class="mb-12 flex items-center justify-center gap-2">
            <div id="step-dot-1" class="w-10 h-2 bg-primary rounded-full transition-all"></div>
            <div id="step-dot-2" class="w-2 h-2 bg-outline-variant rounded-full transition-all"></div>
            <div id="step-dot-3" class="w-2 h-2 bg-outline-variant rounded-full transition-all"></div>
        </div>

        <div id="onboarding-container" class="bg-surface-container-low rounded-3xl p-8 lg:p-12 shadow-xl border border-outline-variant/30 text-center">
            
            <!-- Step 1: Goal -->
            <div id="step-1" class="step-content">
                <h1 class="font-headline text-3xl font-black mb-4">What's your primary goal?</h1>
                <p class="text-on-surface-variant text-sm mb-10 font-medium">We'll use this to match you with the best specialized trainers.</p>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <button onclick="selectGoal('Weight Loss', 'weight')" class="goal-btn p-6 bg-white rounded-2xl border-2 border-outline-variant/30 hover:border-primary transition-all flex flex-col items-center gap-3">
                        <span class="material-symbols-outlined text-4xl text-primary">fitness_center</span>
                        <span class="font-bold">Weight Loss</span>
                    </button>
                    <button onclick="selectGoal('Build Muscle', 'muscle')" class="goal-btn p-6 bg-white rounded-2xl border-2 border-outline-variant/30 hover:border-primary transition-all flex flex-col items-center gap-3">
                        <span class="material-symbols-outlined text-4xl text-secondary">exercise</span>
                        <span class="font-bold">Build Muscle</span>
                    </button>
                    <button onclick="selectGoal('Flexibility', 'flex')" class="goal-btn p-6 bg-white rounded-2xl border-2 border-outline-variant/30 hover:border-primary transition-all flex flex-col items-center gap-3">
                        <span class="material-symbols-outlined text-4xl text-tertiary">self_improvement</span>
                        <span class="font-bold">Flexibility</span>
                    </button>
                    <button onclick="selectGoal('General Fitness', 'general')" class="goal-btn p-6 bg-white rounded-2xl border-2 border-outline-variant/30 hover:border-primary transition-all flex flex-col items-center gap-3">
                        <span class="material-symbols-outlined text-4xl text-primary">health_metrics</span>
                        <span class="font-bold">General Fitness</span>
                    </button>
                </div>
            </div>

            <!-- Step 2: Basic Info -->
            <div id="step-2" class="step-content hidden">
                <h1 class="font-headline text-3xl font-black mb-4">Tell us about yourself</h1>
                <p class="text-on-surface-variant text-sm mb-10 font-medium">This helps trainers personalize your program intensity.</p>
                
                <div class="space-y-8 text-left max-w-sm mx-auto">
                    <div>
                        <label class="block text-sm font-bold mb-3 ml-1">Your Age</label>
                        <input id="age" type="number" placeholder="25" class="w-full px-5 py-4 rounded-xl bg-white border border-outline-variant/30 focus:border-primary focus:ring-4 focus:ring-primary/10 text-lg font-bold"/>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-3 ml-1">Your Gender</label>
                        <div class="flex gap-4">
                            <button onclick="selectGender('Male')" id="gender-male" class="gender-btn flex-1 py-4 bg-white border-2 border-outline-variant/30 rounded-xl font-bold transition-all">Male</button>
                            <button onclick="selectGender('Female')" id="gender-female" class="gender-btn flex-1 py-4 bg-white border-2 border-outline-variant/30 rounded-xl font-bold transition-all">Female</button>
                        </div>
                    </div>
                </div>

                <div class="mt-12 flex gap-4">
                    <button onclick="prevStep(1)" class="w-20 py-4 border-2 border-outline-variant/30 rounded-xl font-bold hover:bg-surface-container transition-all">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </button>
                    <button onclick="finishOnboarding()" id="finish-btn" class="flex-1 py-4 bg-primary text-on-primary rounded-xl font-bold shadow-lg shadow-primary/20 hover:opacity-90 transition-all">
                        Complete Profile
                    </button>
                </div>
            </div>
            
        </div>

        <div class="mt-8 text-center">
            <button onclick="skipOnboarding()" class="text-on-surface-variant hover:text-primary font-bold text-sm transition-colors">Skip for now, I'll do this later</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script>
        let userData = {
            goal: null,
            age: null,
            gender: null
        };

        async function selectGoal(goal, id) {
            userData.goal = goal;
            nextStep(2);
        }

        function selectGender(gender) {
            userData.gender = gender;
            document.querySelectorAll('.gender-btn').forEach(b => {
                b.classList.remove('border-primary', 'bg-primary-container/20');
                b.classList.add('border-outline-variant/30');
            });
            const active = document.getElementById('gender-' + gender.toLowerCase());
            active.classList.remove('border-outline-variant/30');
            active.classList.add('border-primary', 'bg-primary-container/20');
        }

        function nextStep(step) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.add('hidden'));
            document.getElementById('step-' + step).classList.remove('hidden');
            
            // Update dots
            document.querySelectorAll('[id^="step-dot-"]').forEach((dot, i) => {
                if (i + 1 <= step) {
                    dot.className = "w-10 h-2 bg-primary rounded-full transition-all";
                } else {
                    dot.className = "w-2 h-2 bg-outline-variant rounded-full transition-all";
                }
            });
        }

        function prevStep(step) {
            nextStep(step);
        }

        async function finishOnboarding() {
            const ageInput = document.getElementById('age');
            const age = ageInput ? ageInput.value : null;
            userData.age = age ? parseInt(age) : null;

            const user = await getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const finishBtn = document.getElementById('finish-btn');
            const originalBtnContent = finishBtn.innerHTML;
            finishBtn.disabled = true;
            finishBtn.innerHTML = '<div class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div> Saving...';

            try {
                await updateUserProfile(user.id, userData);
                window.location.href = 'client-dashboard.html';
            } catch (error) {
                alert('Failed to save profile: ' + error.message);
                finishBtn.disabled = false;
                finishBtn.innerHTML = originalBtnContent;
            }
        }

        function skipOnboarding() {
            window.location.href = 'client-dashboard.html';
        }
    </script>
</body>
</html>
